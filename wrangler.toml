# Cloudflare Worker config for agent-web-host
# See: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "agent-web-host"
main = "src/index.ts"
compatibility_date = "2026-05-26"
compatibility_flags = ["nodejs_compat"]

# Account this Worker deploys to. Production is bound to slopcafe.com via the
# Custom Domains route below. The workers.dev fallback (agent-web-host.skylled.workers.dev)
# is left enabled so old links and the Cowork connector continue to resolve while
# the cutover is in flight; flip workers_dev = false once everything's verified on
# the new host.
account_id = "d1ff10ae4c1576723a53df979219e74c"

# Whether to publish to <name>.<your>.workers.dev. Kept enabled during the
# slopcafe.com cutover; safe to disable after the new domain is fully live and
# all clients (Claude connector, Antigravity MCP) have been updated.
workers_dev = true

# ---- Custom domain routes -----------------------------------------------------
# Bind slopcafe.com (apex + www) to this Worker. Requires:
#   1. The zone "slopcafe.com" exists in this Cloudflare account.
#   2. Nameservers at Namecheap have been switched to the ones Cloudflare gave
#      you when you added the zone.
# See deployment-runbook.md for the step-by-step.
#
# custom_domain = true makes Cloudflare provision the cert and route DNS
# automatically — no manual A/AAAA records, no "Workers Route" pattern needed.
routes = [
  { pattern = "slopcafe.com", custom_domain = true },
  { pattern = "www.slopcafe.com", custom_domain = true },
]

# ---- R2: sanitized HTML bytes -------------------------------------------------
# In your Worker code: env.DOCS.put(key, body), env.DOCS.get(key), env.DOCS.delete(key)
[[r2_buckets]]
binding = "DOCS"
bucket_name = "agent-web-host-docs"

# ---- D1: metadata (documents, versions, agents, agent_keys) -------------------
# In your Worker code: env.META.prepare("SELECT ...").bind(...).first()
[[d1_databases]]
binding = "META"
database_name = "agent-web-host-meta"
database_id = "af0fecf9-ef48-40cf-842a-9f9e0cffb3d1"
migrations_dir = "migrations"

# ---- KV: OAuth provider state (clients, grants, tokens) -----------------------
# Used by @cloudflare/workers-oauth-provider to persist registered OAuth clients,
# active grants, and issued tokens. Pre-registered clients (one per agent) are
# created via POST /admin/agents/:id/oauth-clients; the mapping back to the
# agents row lives in D1 (oauth_clients table).
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "a7fa9f4c3eed44a99e601ad20d2dccb0"

# ---- Secrets ------------------------------------------------------------------
# Don't put real secrets here. Set them with:
#   npx wrangler secret put HMAC_PEPPER
#   npx wrangler secret put OPERATOR_TOKEN
# Listed here as a reminder of what the Worker will expect.
# [vars] is for non-secret env vars only.

# Import `.wasm` files as `WebAssembly.Module` so the Rust sanitizer can be
# bundled directly (instead of fetched at runtime via import.meta.url, which
# doesn't exist on Workers). Modern wrangler defaults this on, but being
# explicit keeps the build behavior obvious from the config.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Import `.md` files as UTF-8 string default-exports. Used by src/mcp.ts to
# bundle skills/publishing.md and serve it verbatim as the awh://publishing-guide
# MCP resource — single source so the resource can't drift from the doc the
# repo maintains.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[vars]
# Fleet-wide storage cap (enforced in the write path). v1 is single-operator,
# so this is the total budget across every agent's documents, not per-agent.
STORAGE_CAP_BYTES = "2147483648"  # 2 GiB — deliberately generous headroom; revisit only if it ever actually fills

# Browser-session signing epoch — a rotation counter, NOT a secret. Mixed into
# the session-cookie signing key (src/session.ts). Bump this (e.g. "1" → "2")
# and redeploy to invalidate every existing operator browser session at once
# ("log everyone out"). Rotating OPERATOR_TOKEN has the same effect.
SESSION_EPOCH = "1"

# Birth visibility for NEWLY published documents — "private" (default) or
# "public". This reverses "born live": with "private", a freshly published doc
# is NOT served on the anonymous/public browser surface until the operator
# explicitly makes it public (POST /admin/documents/:id/visibility). Agents and
# the operator always read everything regardless; visibility only gates the
# public web. Flip to "public" + redeploy to restore born-live behavior for new
# writes. Existing documents are unaffected (migration 0011 backfills them
# "public"). Any value other than exactly "public" clamps to "private" in code
# (src/access.ts defaultDocumentVisibility).
DEFAULT_DOCUMENT_VISIBILITY = "private"
