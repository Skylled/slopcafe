# Cloudflare Worker config for agent-web-host
# See: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "agent-web-host"
main = "src/index.ts"
compatibility_date = "2026-05-26"
compatibility_flags = ["nodejs_compat"]

# Account this Worker deploys to. The matching workers.dev subdomain is skylled.workers.dev,
# so on first deploy the Worker will be reachable at:
#   https://agent-web-host.skylled.workers.dev
account_id = "d1ff10ae4c1576723a53df979219e74c"

# Whether to publish to <name>.<your>.workers.dev. Set false later when binding a custom domain.
workers_dev = true

# ---- R2: sanitized HTML bytes -------------------------------------------------
# In your Worker code: env.DOCS.put(key, body), env.DOCS.get(key), env.DOCS.delete(key)
[[r2_buckets]]
binding = "DOCS"
bucket_name = "agent-web-host-docs"

# ---- D1: metadata (documents, versions, agents, agent_keys) -------------------
# In your Worker code: env.META.prepare("SELECT ...").bind(...).first()
[[d1_databases]]
binding = "META"
database_name = "agent-web-host-meta"
database_id = "af0fecf9-ef48-40cf-842a-9f9e0cffb3d1"
migrations_dir = "migrations"

# ---- KV: OAuth provider state (clients, grants, tokens) -----------------------
# Used by @cloudflare/workers-oauth-provider to persist registered OAuth clients,
# active grants, and issued tokens. Pre-registered clients (one per agent) are
# created via POST /admin/agents/:id/oauth-clients; the mapping back to the
# agents row lives in D1 (oauth_clients table).
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "a7fa9f4c3eed44a99e601ad20d2dccb0"

# ---- Secrets ------------------------------------------------------------------
# Don't put real secrets here. Set them with:
#   npx wrangler secret put HMAC_PEPPER
#   npx wrangler secret put OPERATOR_TOKEN
# Listed here as a reminder of what the Worker will expect.
# [vars] is for non-secret env vars only.

# Import `.wasm` files as `WebAssembly.Module` so the Rust sanitizer can be
# bundled directly (instead of fetched at runtime via import.meta.url, which
# doesn't exist on Workers). Modern wrangler defaults this on, but being
# explicit keeps the build behavior obvious from the config.
[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

# Import `.md` files as UTF-8 string default-exports. Used by src/mcp.ts to
# bundle skills/publishing.md and serve it verbatim as the awh://publishing-guide
# MCP resource — single source so the resource can't drift from the doc the
# repo maintains.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallthrough = true

[vars]
# Identifier of the active sanitizer profile, written to versions.sanitizer_v on each write.
SANITIZER_VERSION = "ammonia-v1.1"

# Fleet-wide storage cap (enforced in the write path). v1 is single-operator,
# so this is the total budget across every agent's documents, not per-agent.
STORAGE_CAP_BYTES = "104857600"  # 100 MiB
